frr version 10.5.4_git
frr defaults traditional
hostname isp-r1
!
interface eth1
 ip address 192.168.12.2/30
exit
!
interface loopback0
 ip address 172.16.0.1/24
exit
!
ip prefix-list PERMIT-ALL seq 5 permit 0.0.0.0/0 le 32
!
router bgp 65002
 neighbor 192.168.12.1 remote-as 65001
 !
 address-family ipv4 unicast
  network 172.16.0.0/24
  neighbor 192.168.12.1 prefix-list PERMIT-ALL in
  neighbor 192.168.12.1 prefix-list PERMIT-ALL out
 exit-address-family
exit
!
end
