name: milestone-01-bgp-fundamentals

topology:
  nodes:
    enterprise-r1:
      kind: linux
      image: quay.io/frrouting/frr:10.5.4
      binds:
        - configs/enterprise-r1/daemons:/etc/frr/daemons
      cap-add:
        - NET_ADMIN

    isp-r1:
      kind: linux
      image: quay.io/frrouting/frr:10.5.4
      binds:
        - configs/isp-r1/daemons:/etc/frr/daemons
      cap-add:
        - NET_ADMIN

  links:
    - endpoints: ["enterprise-r1:eth1", "isp-r1:eth1"]
 
